.opt:hover{border-color:#ff6b35;background:#203350}
.opt.sel{border-color:#ff9800;background:#203350}

{q:"מה מותר לעשות באזור הבטיחות ללא פיקוח?",o:["טעינת מחסניות בתחמושת חיה","שליפה, ירי יבש והכנסה לנרתיק של נשק בלתי טעון","בדיקת תחמושת סרק עם אקדח טעון","ירי ניסוי"],c:1,r:"כלל 2.4.3"},

{q:"מהו המצב הנכון של אקדח בנרתיק?",o:["טעון ומוכן","ללא מחסנית ופטיש מושמט (או נוקר לא דרוך)","עם מחסנית ריקה, פטיש דרוך","ללא מחסנית, פטיש דרוך ונצור"],c:1,r:"כלל 5.2.1.2"},

{q:"האם מותר לבדוק תמונת כוונות לפני אות ההתחלה?",o:["כן, תמיד","לא - הפעם הראשונה אזהרה, כל הפרה נוספת עונש מהלך","כן, רק עם אקדח ריק","כן, אם השופט מאשר"],c:1,r:"כלל 8.7.1"},

{q:"מה קורה במקרה של זינוק מוקדם (False Start)?",o:["המתחרה ייפסל","השופט עוצר ומתחיל מחדש מ\"האם אתה מוכן?\"","המתחרה מקבל עונש מהלך","ירי חוזר ללא עונש"],c:1,r:"כלל 8.3.4.1"},
{q:"מה הפקודה הראשונה שנותן השופט כשמתחרה מגיע לעמדת הירי?",o:["\"היכון\"","\"האם אתה מוכן?\"","\"טען והתכונן\" (Load and Make Ready)","\"אות התחלה\""],c:2,r:"כלל 8.3.1"},
{q:"מה שם הפקודה שמורה למתחרה לטעון את הנשק?",o:["\"טען וירה\"","\"התכונן\"","\"טען והתכונן\"","\"הכן לירי\""],c:2,r:"כלל 8.3.1"},
{q:"מה שם הפקודה שנאמרת מיד לפני אות ההתחלה?",o:["\"האם אתה מוכן?\"","\"היכון\"","\"התכונן\"","\"הכן\""],c:1,r:"כלל 8.3.3"},
{q:"כמה זמן מינימלי חייב לעבור בין \"היכון\" לאות ההתחלה?",o:["0.5 שניות","1 שנייה","2 שניות","3 שניות"],c:1,r:"כלל 8.3.3"},

{q:"לאחר הצגת אקדח פרוק, אם הוא אכן פרוק, מה הפקודה הבאה?",o:["\"מטווח קר\"","\"אם פרוק, שחרר והחזר לנרתיק\"","\"לנרתיק\"","\"נשק בטוח\""],c:1,r:"כלל 8.3.7.1"},

{q:"מהו כלל הבטיחות לגבי אצבע בזמן שליפה מנרתיק?",o:["מותר להניח אצבע על ההדק","אצבע חייבת להיות מחוץ לשמורת ההדק","אין כלל ספציפי","מותר רק אם הנצרה מופעלת"],c:1,r:"כלל 8.4.1"},

let cor=0,wrn=0,ans=0;
const container=document.getElementById('qc');

function render(){
  container.innerHTML='';cor=0;wrn=0;ans=0;updateScore();
  let curSection='';
  Q.forEach((q,i)=>{
    if(q.s&&q.s!==curSection){
      curSection=q.s;
      const st=document.createElement('div');
      st.className='section-title';
      st.textContent=curSection;
      container.appendChild(st);
    }
    const b=document.createElement('div');
    b.className='qb';b.id='q'+i;
    const letters=['א','ב','ג','ד'];
    let oh=q.o.map((o,j)=>`<div class="opt" onclick="pick(${i},${j})">${letters[j]}. ${o}</div>`).join('');
    b.innerHTML=`<div><span class="qn">${i+1}</span><span class="qt">${q.q}</span></div><div class="qr">${q.r}</div><div class="opts">${oh}</div><div class="fb" id="f${i}"></div>`;
    container.appendChild(b);
  });
}

function pick(qi,oi){
  const b=document.getElementById('q'+qi);
  if(b.classList.contains('ac')||b.classList.contains('aw'))return;
  const opts=b.querySelectorAll('.opt');
  const fb=document.getElementById('f'+qi);
  const c=Q[qi].c;
  opts.forEach(o=>o.classList.add('dis'));
  if(oi===c){
    opts[oi].classList.add('ca');b.classList.add('ac');
    fb.className='fb sh fc';fb.textContent='✓ נכון!';cor++;
  } else {
    opts[oi].classList.add('wa');opts[c].classList.add('ca');b.classList.add('aw');
    fb.className='fb sh fw';fb.textContent='✗ שגוי. התשובה: '+Q[qi].o[c];wrn++;
  }
  ans++;updateScore();
  if(ans===Q.length)showFinal();
}

function updateScore(){
  document.getElementById('cc').textContent='✓ '+cor;
  document.getElementById('wc').textContent='✗ '+wrn;
  document.getElementById('ac').textContent=ans+'/'+Q.length;
  const p=ans?Math.round(cor/ans*100):0;
  document.getElementById('pct').textContent=p+'%';
  document.getElementById('pf').style.width=(ans/Q.length*100)+'%';
}

function showFinal(){
  const pct=Math.round(cor/Q.length*100);
  const fr=document.getElementById('finalResult');
  fr.style.display='block';
  const g=document.getElementById('finalGrade');
  g.textContent=cor+'/'+Q.length+' ('+pct+'%)';
  g.className='grade '+(pct>=70?'pass':'fail');
  const msgs={90:'🏆 מצוין! שליטה מעולה בחומר',80:'🥇 טוב מאוד!',70:'👍 עברת! אבל כדאי לחזור על החומר',60:'📖 לא עברת - קרוב, צריך עוד קצת',0:'📚 צריך לחזור ביסודיות על ספר הכללים'};
  let msg='';for(const[t,m]of Object.entries(msgs))if(pct>=+t)msg=m;
  document.getElementById('finalMsg').textContent=msg;
  fr.scrollIntoView({behavior:'smooth'});
}

function resetAll(){
  document.getElementById('finalResult').style.display='none';
  render();window.scrollTo(0,0);
}

render();
</script>
