<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#0c1520;color:#dde;line-height:1.7;padding:12px}
.container{max-width:940px;margin:0 auto}
h1{text-align:center;color:#ff6b35;font-size:1.7em;margin-bottom:4px}
.subtitle{text-align:center;color:#7a8ea0;margin-bottom:6px;font-size:.88em}
.section-title{background:linear-gradient(135deg,#1a3050,#1a2540);color:#ff9040;font-size:1.15em;font-weight:700;padding:12px 18px;border-radius:10px;margin:22px 0 12px;border-right:4px solid #ff6b35}
.score-bar{position:sticky;top:0;background:#131f2e;border:1px solid #253545;border-radius:10px;padding:10px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5);flex-wrap:wrap;gap:8px}
.score-info{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.score-info span{font-weight:600;font-size:.95em}
.s-correct{color:#4caf50}.s-wrong{color:#f44336}.s-total{color:#ff9800}.s-pct{color:#64b5f6}
.score-bar button{background:#ff6b35;color:#fff;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:.9em;font-weight:600}
.score-bar button:hover{background:#ff8555}
.progress-bg{height:5px;background:#253545;border-radius:3px;flex:1;min-width:100px}
.progress-fill{height:5px;background:linear-gradient(90deg,#ff6b35,#ff9800);border-radius:3px;transition:width .3s}
.qb{background:#152030;border:1px solid #253545;border-radius:10px;padding:16px 18px;margin-bottom:12px;transition:border-color .3s}
.qb.ac{border-color:#4caf50}.qb.aw{border-color:#f44336}
.qn{display:inline-flex;align-items:center;justify-content:center;background:#ff6b35;color:#fff;min-width:28px;height:28px;border-radius:50%;font-weight:700;font-size:.8em;margin-left:8px;padding:0 6px}
.qt{display:inline;font-weight:600;font-size:.98em}
.qr{color:#5a7a95;font-size:.78em;margin-top:3px}
.opts{margin-top:10px}
.opt{display:block;background:#1a2d40;border:2px solid #2a3d50;border-radius:8px;padding:9px 14px;margin-bottom:6px;cursor:pointer;transition:all .2s;font-size:.92em}
.opt:hover{border-color:#ff6b35;background:#203350}
.opt.sel{border-color:#ff9800;background:#203350}
.opt.ca{border-color:#4caf50!important;background:#152a1f!important;opacity:1!important}
.opt.wa{border-color:#f44336!important;background:#2a1515!important}
.opt.dis{pointer-events:none;opacity:.55}
.opt.dis.ca{opacity:1}
.fb{margin-top:8px;padding:7px 12px;border-radius:6px;font-size:.85em;display:none}
.fb.sh{display:block}.fb.fc{background:#152a1f;color:#4caf50}.fb.fw{background:#2a1515;color:#f44336}
.final-result{background:#1a2540;border:2px solid #ff6b35;border-radius:14px;padding:24px;text-align:center;margin:30px 0;display:none}
.final-result h2{color:#ff9800;margin-bottom:10px}
.final-result .grade{font-size:2.5em;font-weight:800;margin:10px 0}
.final-result .pass{color:#4caf50}.final-result .fail{color:#f44336}
</style>
</head>

</div>

{q:"מה חייב מתחרה לעשות כששומע פקודת \"חדל\" (Stop)?",o:["לפרוק מיידית ולהכניס לנרתיק","לחדול מלירות, לעמוד במקום ולחכות להוראות","להניח אקדח על הקרקע","לכוון את האקדח למעלה"],c:1,r:"כלל 8.3.5"},
{q:"כיצד מוצג אקדח חצי-אוטומטי לבדיקה לאחר פריקה?",o:["מחסנית בפנים, צינה סגורה","ללא מחסנית, בית בליעה ריק, צינה נעולה או מוחזקת לאחור","עם מחסנית ריקה, צינה קדימה, פטיש דרוך","ללא מחסנית, צינה קדימה, פטיש דרוך"],c:1,r:"כלל 8.3.6"},

{q:"האם מותר לבדוק תמונת כוונות לפני אות ההתחלה?",o:["כן, תמיד","לא - הפעם הראשונה אזהרה, כל הפרה נוספת עונש מהלך","כן, רק עם אקדח ריק","כן, אם השופט מאשר"],c:1,r:"כלל 8.7.1"},

let cor=0,wrn=0,ans=0;
const container=document.getElementById('qc');

function render(){
  container.innerHTML='';cor=0;wrn=0;ans=0;updateScore();
  let curSection='';
  Q.forEach((q,i)=>{
    if(q.s&&q.s!==curSection){
      curSection=q.s;
      const st=document.createElement('div');
      st.className='section-title';
      st.textContent=curSection;
      container.appendChild(st);
    }
    const b=document.createElement('div');
    b.className='qb';b.id='q'+i;
    const letters=['א','ב','ג','ד'];
    let oh=q.o.map((o,j)=>`<div class="opt" onclick="pick(${i},${j})">${letters[j]}. ${o}</div>`).join('');
    b.innerHTML=`<div><span class="qn">${i+1}</span><span class="qt">${q.q}</span></div><div class="qr">${q.r}</div><div class="opts">${oh}</div><div class="fb" id="f${i}"></div>`;
    container.appendChild(b);
  });
}

function pick(qi,oi){
  const b=document.getElementById('q'+qi);
  if(b.classList.contains('ac')||b.classList.contains('aw'))return;
  const opts=b.querySelectorAll('.opt');
  const fb=document.getElementById('f'+qi);
  const c=Q[qi].c;
  opts.forEach(o=>o.classList.add('dis'));
  if(oi===c){
    opts[oi].classList.add('ca');b.classList.add('ac');
    fb.className='fb sh fc';fb.textContent='✓ נכון!';cor++;
  } else {
    opts[oi].classList.add('wa');opts[c].classList.add('ca');b.classList.add('aw');
    fb.className='fb sh fw';fb.textContent='✗ שגוי. התשובה: '+Q[qi].o[c];wrn++;
  }
  ans++;updateScore();
  if(ans===Q.length)showFinal();
}

function updateScore(){
  document.getElementById('cc').textContent='✓ '+cor;
  document.getElementById('wc').textContent='✗ '+wrn;
  document.getElementById('ac').textContent=ans+'/'+Q.length;
  const p=ans?Math.round(cor/ans*100):0;
  document.getElementById('pct').textContent=p+'%';
  document.getElementById('pf').style.width=(ans/Q.length*100)+'%';
}

function showFinal(){
  const pct=Math.round(cor/Q.length*100);
  const fr=document.getElementById('finalResult');
  fr.style.display='block';
  const g=document.getElementById('finalGrade');
  g.textContent=cor+'/'+Q.length+' ('+pct+'%)';
  g.className='grade '+(pct>=70?'pass':'fail');
  const msgs={90:'🏆 מצוין! שליטה מעולה בחומר',80:'🥇 טוב מאוד!',70:'👍 עברת! אבל כדאי לחזור על החומר',60:'📖 לא עברת - קרוב, צריך עוד קצת',0:'📚 צריך לחזור ביסודיות על ספר הכללים'};
  let msg='';for(const[t,m]of Object.entries(msgs))if(pct>=+t)msg=m;
  document.getElementById('finalMsg').textContent=msg;
  fr.scrollIntoView({behavior:'smooth'});
}

function resetAll(){
  document.getElementById('finalResult').style.display='none';
  render();window.scrollTo(0,0);
}

render();
</script>
